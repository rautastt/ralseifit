<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>the cat · ralsei.fit</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#16241a;--card:#243a2c;--card2:#2c4536;
    --cream:#f5ecd7;--green:#8fd49e;--green-dim:#6abe6f;
    --pink:#f7a8c4;--pink-dim:#e587a8;--shadow:0 8px 0 rgba(0,0,0,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Quicksand',sans-serif;color:var(--cream);
    background:
      linear-gradient(180deg, rgba(15,29,20,.55) 0%, rgba(15,29,20,.75) 100%),
      url('https://i.pinimg.com/originals/2d/56/d9/2d56d94edf787d0339a354e2f3b5d207.png') center/cover no-repeat fixed;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:32px 16px 64px;overflow-x:hidden;
  }
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .stars i{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--cream);opacity:.5;animation:twinkle 3s infinite ease-in-out}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.9;transform:scale(1.3)}}
  .wrap{position:relative;z-index:1;width:100%;max-width:560px;text-align:center}
  header.hero{margin-bottom:20px}
  h1{font-family:'VT323',monospace;font-size:38px;letter-spacing:1px}
  h1 .dot{color:var(--pink)}
  .sub{color:var(--green);font-size:15px;font-weight:500;margin-top:2px}

  nav.pages{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0 24px}
  nav.pages a{font-family:'VT323',monospace;font-size:20px;text-decoration:none;color:var(--cream);background:#1c3024;border:2px solid #00000040;padding:6px 16px;border-radius:10px;box-shadow:0 4px 0 rgba(0,0,0,.25);transition:transform .1s,background .2s,color .2s}
  nav.pages a:hover{background:#24402f;color:var(--green);transform:translateY(-2px)}

  .frame{
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:3px solid #00000040;border-radius:20px;padding:18px;
    box-shadow:var(--shadow);margin-bottom:16px;
  }
  .frame .cap{font-family:'VT323',monospace;font-size:20px;color:var(--green);margin-bottom:12px;letter-spacing:1px}
  .cat{
    width:100%;max-width:380px;aspect-ratio:1/1;margin:0 auto;
    border-radius:16px;background:#0f1d14;border:2px solid #00000080;
    cursor:pointer;display:block;position:relative;overflow:hidden;
    transition:transform .15s;
  }
  .cat:hover{transform:scale(1.02)}
  .cat:active{transform:scale(.98)}
  .cat img{width:100%;height:100%;display:block;object-fit:contain}
  .cat .zzz{position:absolute;font-family:'VT323',monospace;font-size:24px;color:var(--cream);opacity:.7;animation:zz 2.4s ease-in-out infinite}
  .cat .zzz.z1{top:30%;left:62%;animation-delay:0s}
  .cat .zzz.z2{top:22%;left:70%;animation-delay:.6s;font-size:18px}
  .cat .zzz.z3{top:14%;left:76%;animation-delay:1.2s;font-size:14px}
  @keyframes zz{0%,100%{opacity:0;transform:translateY(0)}50%{opacity:.8;transform:translateY(-6px)}}

  .warn{font-size:14px;color:#b8c9b0;line-height:1.6;margin-top:6px}
  .warn b{color:var(--pink)}

  .music-btn{position:fixed;right:18px;bottom:18px;z-index:50;width:52px;height:52px;border-radius:50%;background:var(--card);border:2px solid var(--green);color:var(--green);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.3);transition:transform .12s}
  .music-btn:hover{transform:scale(1.08)}
  .music-btn svg{width:24px;height:24px}
  .music-btn .eq{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--pink);border:2px solid #0f1d14;display:none}
  .music-btn.playing .eq{display:block;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
  audio{display:none}
  footer{text-align:center;margin-top:24px;font-size:16px;color:#7a9a82;font-family:'VT323',monospace}
  footer .heart{color:var(--pink)}
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="wrap">
    <header class="hero">
      <h1>the cat<span class="dot">.</span>fit</h1>
      <div class="sub">☾ shh... it's sleeping ☾</div>
    </header>

    <nav class="pages">
      <a class="active" href="/">home</a>
      <a href="/music.html">music</a>
      <a href="/projects.html">projects</a>
      <a href="/game.html">quest</a>
      <a href="/socials.html">my socials</a>
    </nav>

    <div class="frame">
      <div class="cap">~ a drawing by clover ~</div>
      <!-- sleeping cat (replace public/cat.png with your own drawing) -->
      <div class="cat" id="cat" role="button" tabindex="0" aria-label="a sleeping cat, drawn by clover">
        <img src="/cat.png" alt="a sleeping cat, drawn by clover" />
        <span class="zzz z1">z</span>
        <span class="zzz z2">z</span>
        <span class="zzz z3">z</span>
      </div>
      <div class="warn">a drawing of my cat, sleeping. sorry, it has no textures, but <b>please don't click on it.</b>/div>
    </div>

    <footer>made with <span class="heart">♥</span> by clover · ralsei.fit</footer>
  </div>

  <button class="music-btn" id="musicBtn" title="toggle theme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <span class="eq"></span>
  </button>
  <audio id="theme" src="/sitetheme.wav" loop preload="auto"></audio>

<script>
  (function(){var s=document.getElementById('stars');for(var i=0;i<40;i++){var n=document.createElement('i');n.style.left=Math.random()*100+'%';n.style.top=Math.random()*100+'%';n.style.animationDelay=(Math.random()*3)+'s';s.appendChild(n);}})();

  (function(){
    var a=document.getElementById('theme'),btn=document.getElementById('musicBtn');
    var KEY='ralsei_audio';
    function save(){try{localStorage.setItem(KEY,JSON.stringify({t:a.currentTime,p:1}))}catch(e){}}
    function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
    var st=load(); if(st.t){a.currentTime=st.t;}
    a.volume=0.4;
    a.play().then(function(){btn.classList.add('playing')}).catch(function(){});
    setInterval(save,1500);
    btn.addEventListener('click',function(){if(a.paused){a.play().then(function(){btn.classList.add('playing')});}else{a.pause();btn.classList.remove('playing');save();}});
    window.addEventListener('beforeunload',save);
  })();

  (function(){
    var cat=document.getElementById('cat');
    function wake(){
      alert('The cat felt you trying to touch it, even in its sleep...');
      alert('You turn behind and try to run.');
      alert('???');
      alert('Its as if the cat was a...fountain?');
      alert('Yeah...');
      alert('*Hey!*');
      alert('!!!');
      alert('*WATCH OUT!*');
      alert('*OH GOD, ITS TOO LAT-*');
      window.location.href='https://secret.ralsei.fit';
    }
    cat.addEventListener('click',wake);
    cat.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();wake();}});
  })();
</script>
</body>
</html>
