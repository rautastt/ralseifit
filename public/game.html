<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>...</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#16241a;--card:#243a2c;--card2:#2c4536;
    --cream:#f5ecd7;--green:#8fd49e;--green-dim:#6abe6f;
    --pink:#f7a8c4;--pink-dim:#e587a8;--shadow:0 8px 0 rgba(0,0,0,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Quicksand',sans-serif;color:var(--cream);
    background:
      linear-gradient(180deg, rgba(15,29,20,.55) 0%, rgba(15,29,20,.75) 100%),
      url('') center/cover no-repeat fixed;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 64px;overflow-x:hidden;
  }
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .stars i{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--cream);opacity:.5;animation:twinkle 3s infinite ease-in-out}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.9;transform:scale(1.3)}}
  .wrap{position:relative;z-index:1;width:100%;max-width:680px}
  header.hero{text-align:center;margin-bottom:14px}
  h1{font-family:'VT323',monospace;font-size:38px;letter-spacing:1px}
  h1 .dot{color:var(--pink)}
  .sub{color:var(--green);font-size:14px;font-weight:500;margin-top:2px}

  nav.pages{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0 18px}
  nav.pages a{font-family:'VT323',monospace;font-size:20px;text-decoration:none;color:var(--cream);background:#1c3024;border:2px solid #00000040;padding:6px 16px;border-radius:10px;box-shadow:0 4px 0 rgba(0,0,0,.25);transition:transform .1s,background .2s,color .2s}
  nav.pages a:hover{background:#24402f;color:var(--green);transform:translateY(-2px)}
  nav.pages a.active{background:var(--green-dim);color:#0f1d14;border-color:var(--green)}

  .hud{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:2px solid #00000040;border-radius:14px;padding:12px 16px;
    box-shadow:var(--shadow);margin-bottom:14px;
  }
  .hud .label{font-family:'VT323',monospace;font-size:18px;color:var(--green)}
  .hud .parts{display:flex;gap:6px}
  .hud .parts i{width:22px;height:22px;border-radius:50%;background:#0f1d14;border:2px solid #3a5a45;display:flex;align-items:center;justify-content:center;font-size:12px;color:#3a5a45;transition:all .25s}
  .hud .parts i.got{background:var(--green-dim);border-color:var(--green);color:#0f1d14;transform:scale(1.1)}
  .hud .msg{font-size:13px;color:#b8c9b0;font-weight:600}

  .map{
    position:relative;width:100%;aspect-ratio:1/1;max-width:560px;margin:0 auto;
    background:
      radial-gradient(circle at 30% 30%, #2a4a36 0%, transparent 35%),
      radial-gradient(circle at 70% 70%, #2a3a44 0%, transparent 35%),
      linear-gradient(180deg,#1c3024,#142018);
    border:3px solid #00000080;border-radius:18px;box-shadow:var(--shadow);overflow:hidden;
    touch-action:none;
  }
  /* grid texture */
  .map::before{
    content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(143,212,158,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(143,212,158,.06) 1px, transparent 1px);
    background-size:32px 32px;
    pointer-events:none;
  }
  .map .deco{position:absolute;font-size:22px;opacity:.5;pointer-events:none;user-select:none}
  .player{
    position:absolute;width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%, #5a8a6e, #2c4536);
    border:3px solid var(--green);
    box-shadow:0 0 16px rgba(143,212,158,.6);
    transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;
    transition:box-shadow .2s;
    z-index:5;
  }
  .player svg{width:22px;height:22px}
  .part{
    position:absolute;width:30px;height:30px;
    transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;z-index:4;
    animation:float 2.4s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-6px)}}
  .part .gem{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #ffe9f1, var(--pink) 60%, var(--pink-dim));
    border:2px solid #fff;
    box-shadow:0 0 14px rgba(247,168,196,.7);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:14px;font-weight:700;
  }
  .part.collected{animation:pop .5s ease forwards;pointer-events:none}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}

  .controls{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:240px;margin:18px auto 0;
  }
  .controls button{
    font-family:'VT323',monospace;font-size:24px;
    background:#1c3024;color:var(--cream);
    border:2px solid #00000040;border-radius:12px;padding:12px;
    box-shadow:0 4px 0 rgba(0,0,0,.25);cursor:pointer;
    transition:transform .08s, background .2s;
    user-select:none;-webkit-user-select:none;
  }
  .controls button:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.25);background:#24402f}
  .controls .spacer{visibility:hidden}

  .hint{
    text-align:center;font-size:14px;color:#b8c9b0;margin-top:14px;line-height:1.5;
  }
  .hint b{color:var(--pink)}

  .toast{
    position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-120%);
    background:var(--card);border:2px solid var(--green);color:var(--cream);
    padding:10px 18px;border-radius:12px;font-weight:600;font-size:15px;
    box-shadow:0 8px 0 rgba(0,0,0,.25);z-index:100;
    transition:transform .35s cubic-bezier(.2,1.4,.4,1);
  }
  .toast.show{transform:translateX(-50%) translateY(0)}

  .gate{
    position:absolute;width:54px;height:54px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, #3a2a44, #1c3024);
    border:3px solid #5a3a64;
    display:flex;align-items:center;justify-content:center;
    color:#7a5a84;font-size:22px;
    z-index:3;opacity:.45;transition:all .3s;
  }
  .gate.open{opacity:1;border-color:var(--pink);box-shadow:0 0 22px rgba(247,168,196,.7);color:var(--pink);cursor:pointer;animation:float 2.4s ease-in-out infinite}
  .gate.open:hover{transform:translate(-50%,-50%) scale(1.1)}

  .music-btn{position:fixed;right:18px;bottom:18px;z-index:50;width:52px;height:52px;border-radius:50%;background:var(--card);border:2px solid var(--green);color:var(--green);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.3);transition:transform .12s}
  .music-btn:hover{transform:scale(1.08)}
  .music-btn svg{width:24px;height:24px}
  .music-btn .eq{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--pink);border:2px solid #0f1d14;display:none}
  .music-btn.playing .eq{display:block;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
  audio{display:none}
  footer{text-align:center;margin-top:24px;font-size:16px;color:#7a9a82;font-family:'VT323',monospace}
  footer .heart{color:var(--pink)}
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="wrap">
    <header class="hero">
      <h1>quest<span class="dot">.</span>fit</h1>
      <div class="sub">...</div>
    </header>

    <nav class="pages">
      <a class="active" href="/">No.</a>
      <a href="/game.html">No.</a>
      <a href="/game.html">No.</a>
      <a href="/game.html">No.</a>
    </nav>

    <div class="hud">
      <div class="label">parts <span id="count">0</span>/5</div>
      <div class="parts" id="parts">
        <i>✿</i><i>♪</i><i>✦</i><i>☾</i><i>♥</i>
      </div>
      <div class="msg" id="msg">Find them all...</div>
    </div>

    <div class="map" id="map">
      <div class="deco" style="left:12%;top:18%">?</div>
      <div class="deco" style="left:78%;top:24%">?</div>
      <div class="deco" style="left:18%;top:74%">?</div>
      <div class="deco" style="left:82%;top:80%">?</div>
      <div class="deco" style="left:48%;top:12%">?</div>
      <div class="deco" style="left:50%;top:86%">?</div>

      <div class="gate" id="gate" style="left:50%;top:50%">🔒</div>

      <div class="player" id="player" style="left:50%;top:88%">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f5ecd7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.5 6.5L21 9l-5 4.5L17.5 21 12 17l-5.5 4L8 13.5 3 9l6.5-.5z"/></svg>
      </div>
    </div>

    <div class="controls">
      <div class="spacer"></div>
      <button data-dir="up">▲</button>
      <div class="spacer"></div>
      <button data-dir="left">◀</button>
      <button data-dir="down">▼</button>
      <button data-dir="right">▶</button>
    </div>

    <div class="hint">...</b>...</div>

    <footer>Used to be made with love.</footer>
  </div>

  <div class="toast" id="toast">One part.</div>

  <button class="music-btn" id="musicBtn" title="toggle theme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <span class="eq"></span>
  </button>
  <audio id="theme" src="/sitetheme.wav" loop preload="auto"></audio>

<script>
  (function(){var s=document.getElementById('stars');for(var i=0;i<40;i++){var n=document.createElement('i');n.style.left=Math.random()*100+'%';n.style.top=Math.random()*100+'%';n.style.animationDelay=(Math.random()*3)+'s';s.appendChild(n);}})();

  // persistent theme
  (function(){
    var a=document.getElementById('theme'),btn=document.getElementById('musicBtn');
    var KEY='ralsei_audio';
    function save(){try{localStorage.setItem(KEY,JSON.stringify({t:a.currentTime,p:1}))}catch(e){}}
    function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
    var st=load(); if(st.t){a.currentTime=st.t;}
    a.volume=0.4;
    a.play().then(function(){btn.classList.add('playing')}).catch(function(){});
    setInterval(save,1500);
    btn.addEventListener('click',function(){if(a.paused){a.play().then(function(){btn.classList.add('playing')});}else{a.pause();btn.classList.remove('playing');save();}});
    window.addEventListener('beforeunload',save);
  })();

  // ---- game ----
  (function(){
    var map=document.getElementById('map');
    var player=document.getElementById('player');
    var gate=document.getElementById('gate');
    var countEl=document.getElementById('count');
    var msgEl=document.getElementById('msg');
    var partsEl=document.getElementById('parts');
    var toast=document.getElementById('toast');

    var W=100,H=100; // percent space
    var px=50,py=88;
    var STEP=4;
    var collected=0;
    var TOTAL=5;

    // place parts
    var spots=[
      {x:14,y:30,glyph:'✿'},
      {x:86,y:34,glyph:'♪'},
      {x:24,y:64,glyph:'✦'},
      {x:80,y:66,glyph:'☾'},
      {x:50,y:22,glyph:'♥'}
    ];
    var partEls=[];
    spots.forEach(function(s,i){
      var d=document.createElement('div');
      d.className='part';
      d.style.left=s.x+'%';d.style.top=s.y+'%';
      d.innerHTML='<div class="gem">'+s.glyph+'</div>';
      d.addEventListener('click',function(){tryCollect(i)});
      map.appendChild(d);
      partEls.push(d);
    });

    function render(){
      player.style.left=px+'%';
      player.style.top=py+'%';
    }
    function showToast(t){
      toast.textContent=t;toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t=setTimeout(function(){toast.classList.remove('show')},1400);
    }
    function tryCollect(i){
      if(partEls[i].classList.contains('collected'))return;
      var dx=(spots[i].x-px),dy=(spots[i].y-py);
      if(Math.sqrt(dx*dx+dy*dy)<9){
        partEls[i].classList.add('collected');
        collected++;
        countEl.textContent=collected;
        partsEl.children[i].classList.add('got');
        showToast('+1 part!  ('+collected+'/'+TOTAL+')');
        if(collected>=TOTAL){
          gate.classList.add('open');
          gate.textContent='✿';
          msgEl.textContent='The gate has open.';
        } else {
          msgEl.textContent=(TOTAL-collected)+' left.';
        }
      }
    }
    function move(dir){
      if(dir==='up')py=Math.max(4,py-STEP);
      if(dir==='down')py=Math.min(96,py+STEP);
      if(dir==='left')px=Math.max(4,px-STEP);
      if(dir==='right')px=Math.min(96,px+STEP);
      render();
      // collect nearby
      for(var i=0;i<partEls.length;i++)tryCollect(i);
      // gate
      if(gate.classList.contains('open')){
        var gx=50,gy=50;
        var dx=gx-px,dy=gy-py;
        if(Math.sqrt(dx*dx+dy*dy)<7){
          window.location.href='/cat.html';
        }
      }
    }

    document.querySelectorAll('.controls button[data-dir]').forEach(function(b){
      b.addEventListener('click',function(){move(b.dataset.dir)});
    });
    window.addEventListener('keydown',function(e){
      var k=e.key.toLowerCase();
      var map={arrowup:'up',arrowdown:'down',arrowleft:'left',arrowright:'right',w:'up',s:'down',a:'left',d:'right'};
      if(map[k]){e.preventDefault();move(map[k]);}
    });
    gate.addEventListener('click',function(){
      if(gate.classList.contains('open')){
        var dx=50-px,dy=50-py;
        if(Math.sqrt(dx*dx+dy*dy)<12){window.location.href='/cat.html';}
        else{showToast('Walk up to the gate.');}
      } else {showToast('Find all 5 parts first.');}
    });
    render();
  })();
</script>
</body>
</html>
